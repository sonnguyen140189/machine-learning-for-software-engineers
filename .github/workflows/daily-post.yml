name: Daily Phu Quoc Post

on:
  schedule:
    # 02:00 UTC = 09:00 Asia/Ho_Chi_Minh
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual posting)"
        required: false
        default: "false"
      posts_per_run:
        description: "How many distinct places to post this run (max 50). For >25 set skip_instagram=true."
        required: false
        default: "12"
      skip_instagram:
        description: "Skip IG (carousel + Reel) — REQUIRED when posts_per_run > 25 (IG caps at 25 posts / 24h)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci || npm install

      - name: Generate phase (build media + scripts, no posting)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PUBLIC_MEDIA_BASE_URL: ${{ vars.PUBLIC_MEDIA_BASE_URL }}
          POSTS_PER_RUN: ${{ github.event.inputs.posts_per_run || '12' }}
          TIMEZONE: Asia/Ho_Chi_Minh
          PHASE: generate
        run: node src/orchestrator.js

      - name: Prune media older than 3 days (keep the Pages site small)
        run: |
          # GitHub Pages redeploys the ENTIRE tree on every push. Committing
          # every day's media without ever deleting it bloated out/media to
          # ~2.8 GB / 5,895 files across 57 days. At that size Pages takes
          # >10 min to deploy, so the "wait for Pages" gate below timed out
          # (HTTP 404) and the post phase never ran. The bot only needs the
          # last couple of days of media to be servable, so prune the rest.
          CUTOFF=$(date -u -d '3 days ago' +%Y-%m-%d)
          echo "Pruning out/media + out/content dated before $CUTOFF"
          removed=0
          for f in out/media/*.jpg out/media/*.mp4 out/content-*.json; do
            [ -e "$f" ] || continue
            d=$(echo "$f" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
            [ -z "$d" ] && continue           # skip non-dated files (test.txt, etc.)
            if [[ "$d" < "$CUTOFF" ]]; then
              rm -f "$f"
              removed=$((removed + 1))
            fi
          done
          echo "Removed $removed stale files. Remaining in out/media: $(ls out/media/ | wc -l)"

      - name: Commit + push media so Pages serves it
        run: |
          git config user.name "phuquoc-review-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A out/
          if ! git diff --cached --quiet; then
            git commit -m "Generate batch $(date -u +%Y-%m-%dT%H-%M)"
            git push
          fi

      - name: Wait until newly pushed media is reachable on Pages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          FIRST_FILE=$(git diff HEAD~1 HEAD --name-only --diff-filter=A 2>/dev/null | grep '^out/media/' | head -1)
          if [ -z "$FIRST_FILE" ]; then
            echo "No new media file found in HEAD — skipping wait."
            exit 0
          fi
          URL="${PUBLIC_MEDIA_BASE_URL%/out/media}/$FIRST_FILE"
          # PUBLIC_MEDIA_BASE_URL ends with /out/media; FIRST_FILE starts with out/media/
          echo "Probing: $URL"
          for i in $(seq 1 60); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -I "$URL")
            echo "[$i] $URL → HTTP $code"
            if [ "$code" = "200" ]; then
              echo "✓ Pages is serving the new media."
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for Pages to serve $URL"
          exit 1
        env:
          PUBLIC_MEDIA_BASE_URL: ${{ vars.PUBLIC_MEDIA_BASE_URL }}

      - name: Post phase
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_IG_BUSINESS_ACCOUNT_ID: ${{ secrets.META_IG_BUSINESS_ACCOUNT_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_OPEN_ID: ${{ secrets.TIKTOK_OPEN_ID }}
          PUBLIC_MEDIA_BASE_URL: ${{ vars.PUBLIC_MEDIA_BASE_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SKIP_INSTAGRAM: ${{ github.event.inputs.skip_instagram || 'false' }}
          TIMEZONE: Asia/Ho_Chi_Minh
          PHASE: post
        run: node src/orchestrator.js

      - name: Commit state + cleanup pending file
        if: success() || failure()
        run: |
          git pull --rebase origin master || true
          git add -A out/
          if ! git diff --cached --quiet; then
            git commit -m "Post batch $(date -u +%Y-%m-%dT%H-%M)"
            git push
          fi

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-post-debug
          path: out/
